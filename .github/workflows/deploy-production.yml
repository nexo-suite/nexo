name: Deploy Production

on:
  push:
    tags:
      - 'nexo-v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/deploy/nexo
            git pull origin main

            FINANCE_VERSION=$(node -p "require('./apps/finance/package.json').version")

            docker compose pull --ignore-pull-failures || true
            FINANCE_VERSION="$FINANCE_VERSION" docker compose --profile server up -d --build --remove-orphans

            # Also redeploy preview with the same main code so it stays in sync
            docker compose -f docker-compose.preview.yml \
              --env-file .env.preview \
              up -d --build --remove-orphans
