name: Deploy Production

on:
  push:
    tags:
      - 'nexo-v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        env:
          APP_VERSION: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_VERSION
          script: |
            set -e
            cd /home/deploy/nexo
            git pull origin main

            # Strip the "nexo-v" prefix from the tag (e.g. nexo-v0.3.0 → 0.3.0)
            APP_VERSION="${APP_VERSION#nexo-v}"
            export APP_VERSION

            # Deploy production + server (Caddy, bot)
            docker compose \
              --profile production --profile server \
              --env-file .env \
              up -d --build

            # Reload Caddy config in case Caddyfile changed
            docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile

            # Redeploy preview so it stays on the latest main code
            docker compose \
              --profile preview \
              --env-file .env.preview \
              up -d --build
