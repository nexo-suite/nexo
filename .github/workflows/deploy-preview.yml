name: Deploy Preview

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number that triggered this deployment
        required: true
      sha:
        description: Commit SHA to deploy
        required: true
      comment_id:
        description: Bot comment ID to update
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha }}

      - name: Deploy preview to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/deploy/nexo
            git fetch origin
            git checkout ${{ inputs.sha }}

            export PUBLIC_APP_VERSION=pr-${{ inputs.pr_number }}

            docker compose --profile preview \
              --env-file .env.preview \
              up -d --build

      - name: Update bot comment — success
        uses: actions/github-script@v9
        if: success()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ inputs.comment_id }},
              body: [
                '### Nexo Preview',
                '',
                '**Status:** ✅ Live @ `${{ inputs.sha }}`',
                '',
                '| App | URL |',
                '|---|---|',
                '| Landing | https://preview.krieger2501.de |',
                '| Finance | https://finance.preview.krieger2501.de |',
                '| Auth | https://auth.preview.krieger2501.de |',
                '| Admin | https://admin.preview.krieger2501.de |',
                '',
                '- [ ] Redeploy',
                '',
                '<!-- nexo-preview pr:${{ inputs.pr_number }} -->',
              ].join('\n'),
            });

      - name: Update bot comment — failure
        uses: actions/github-script@v9
        if: failure()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ inputs.comment_id }},
              body: [
                '### Nexo Preview',
                '',
                '**Status:** ❌ Deploy failed @ `${{ inputs.sha }}` — [view run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})',
                '',
                '- [ ] Retry deploy',
                '',
                '<!-- nexo-preview pr:${{ inputs.pr_number }} -->',
              ].join('\n'),
            });
