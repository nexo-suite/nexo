name: Deploy Preview

# Bot dispatches this with a specific PR number + SHA. The bot owns all
# user-facing PR comment state via webhooks (registry_package, workflow_run);
# this workflow only does the SSH deploy. The run-name embeds the PR number
# so the bot can match the workflow_run.completed webhook back to its state.

run-name: 'Deploy preview · PR #${{ inputs.pr_number }} @ ${{ inputs.sha }}'

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number that triggered this deployment
        required: true
      sha:
        description: Commit SHA to deploy
        required: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          ref: ${{ inputs.sha }}

      - name: Deploy preview to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: PR_NUMBER
          script: |
            set -e
            cd /home/deploy/nexo
            git fetch --prune origin
            git checkout ${{ inputs.sha }}

            # Pull prebuilt :pr-<num> images (pushed by CI on this PR).
            export PREVIEW_TAG="pr-${PR_NUMBER}"
            docker compose --profile preview \
              --env-file .env.preview \
              pull
            docker compose --profile preview \
              --env-file .env.preview \
              up -d
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
