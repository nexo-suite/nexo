name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package.json ordering
        run: pnpm package:check

      - name: Check formatting
        run: pnpm format:check

      - name: Sync SvelteKit types
        run: pnpm sync

      - name: Compile translations
        run: pnpm translate

      - name: Check unused exports
        run: pnpm knip

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type:check

      - name: Build
        run: pnpm build

      - name: Tests
        run: pnpm test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app: [admin, auth, bot, finance, flaschen, landing]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Build ${{ matrix.app }}
        run: docker build -f apps/${{ matrix.app }}/Dockerfile -t nexo-${{ matrix.app }}:ci .
