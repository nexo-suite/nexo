name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup

      - name: Check package.json sort order
        run: pnpm package:check

      - name: Check formatting (prettier)
        run: pnpm format:check

      - name: Sync SvelteKit types
        run: pnpm sync

      - name: Compile Paraglide messages
        run: pnpm translate

      - name: Build workspace packages
        run: pnpm build:packages

      - name: Find dead code (knip)
        run: pnpm knip

      - name: Lint (eslint)
        run: pnpm lint

      - name: Type check (svelte-check / tsc)
        run: pnpm type:check

      - name: Run unit tests
        run: pnpm test

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup

      - name: Decide build strategy
        id: decide
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          RELEASE_PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: pnpm exec nexo ci-decide

      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      # ─── Retag fast-path (release-please PR or main push with source PR) ───
      - name: Retag existing image
        if: steps.decide.outputs.strategy == 'retag'
        env:
          FROM_TAG: ${{ steps.decide.outputs.from-tag }}
          TO_TAGS: ${{ steps.decide.outputs.tags }}
        run: |
          IFS=',' read -ra TAGS <<< "$TO_TAGS"
          pnpm exec nexo retag --from "$FROM_TAG" --to "${TAGS[@]}"

      # ─── Full-build path (regular PRs and main pushes without source PR) ───
      - name: Build apps
        if: steps.decide.outputs.strategy == 'full'
        run: pnpm build

      - name: Prepare deploy contexts (pnpm deploy per app)
        if: steps.decide.outputs.strategy == 'full'
        run: pnpm exec nexo prepare-contexts

      - name: Build & push container images
        if: steps.decide.outputs.strategy == 'full'
        env:
          PUSH_FLAG: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && '--push' || '' }}
          TO_TAGS: ${{ steps.decide.outputs.tags }}
        run: |
          IFS=',' read -ra TAGS <<< "$TO_TAGS"
          TAG_ARGS=()
          for t in "${TAGS[@]}"; do TAG_ARGS+=(--tag "$t"); done
          pnpm exec nexo build-images \
            "${TAG_ARGS[@]}" \
            $PUSH_FLAG \
            --git-commit "$GITHUB_SHA" \
            --build-time "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  release-please:
    name: Release Please
    needs: [checks, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
      versions_json: ${{ steps.versions.outputs.json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Setup Node + pnpm
        if: steps.release.outputs.releases_created == 'true'
        uses: ./.github/actions/setup

      - name: Collect versions for promote
        id: versions
        if: steps.release.outputs.releases_created == 'true'
        env:
          RP_OUTPUTS_JSON: ${{ toJSON(steps.release.outputs) }}
        run: |
          json=$(pnpm exec nexo collect-versions)
          echo "json=$json" >> "$GITHUB_OUTPUT"

  promote:
    name: Promote to :latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Promote :main-<sha> to :latest and :<version>
        env:
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_VERSIONS_JSON: ${{ needs.release-please.outputs.versions_json }}
        run: pnpm exec nexo promote

  deploy-production:
    name: Deploy to Production
    needs: [release-please, promote]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          APP_VERSION_AUTH: ${{ fromJSON(needs.release-please.outputs.versions_json).auth }}
          APP_VERSION_ADMIN: ${{ fromJSON(needs.release-please.outputs.versions_json).admin }}
          APP_VERSION_FINANCE: ${{ fromJSON(needs.release-please.outputs.versions_json).finance }}
          APP_VERSION_FLASCHEN: ${{ fromJSON(needs.release-please.outputs.versions_json).flaschen }}
          APP_VERSION_LANDING: ${{ fromJSON(needs.release-please.outputs.versions_json).landing }}
          APP_VERSION_BOT: ${{ fromJSON(needs.release-please.outputs.versions_json).bot }}
          APP_COMMIT: ${{ github.sha }}
          APP_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_VERSION_AUTH,APP_VERSION_ADMIN,APP_VERSION_FINANCE,APP_VERSION_FLASCHEN,APP_VERSION_LANDING,APP_VERSION_BOT,APP_COMMIT,APP_BUILD_TIME
          script: |
            set -e
            cd /home/deploy/nexo
            git fetch --prune origin
            git checkout -f main
            git reset --hard origin/main
            node scripts/deploy.mjs
