name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package.json ordering
        run: pnpm package:check

      - name: Check formatting
        run: pnpm format:check

      - name: Sync SvelteKit types
        run: pnpm sync

      - name: Compile translations
        run: pnpm translate

      - name: Check unused exports
        run: pnpm knip

      - name: Lint
        run: pnpm lint

      - name: Build workspace packages
        run: pnpm build:packages

      - name: Type check
        run: pnpm type:check

      - name: Build
        run: pnpm build

      - name: Tests
        run: pnpm test

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { app: db, dir: packages/db }
          - { app: auth, dir: apps/auth }
          - { app: admin, dir: apps/admin }
          - { app: finance, dir: apps/finance }
          - { app: flaschen, dir: apps/flaschen }
          - { app: landing, dir: apps/landing }
          - { app: bot, dir: apps/bot }

    steps:
      - name: Find source PR for main push
        id: source_pr
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Linked PR for the merge commit. Empty when main was pushed directly
          # (no PR), in which case we fall back to a full build below.
          PR_NUM=$(gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0].number' 2>/dev/null || true)
          echo "pr=${PR_NUM}" >> "$GITHUB_OUTPUT"

      - name: Detect release-please PR
        id: release_pr
        if: github.event_name == 'pull_request'
        run: |
          # release-please's release PRs only bump versions and changelogs —
          # the built image is byte-identical to :main. Retag instead of build.
          HEAD="${{ github.event.pull_request.head.ref }}"
          case "$HEAD" in
            release-please--*) echo "is_release=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "is_release=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Log in to GHCR
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Fast path: main push with a known source PR. Retag the existing
      # :pr-<num> image as :main-<sha> and :main using a registry-side manifest
      # op — no checkout, no buildx, no layer build.
      - name: Retag pr-${{ steps.source_pr.outputs.pr }} as :main / :main-${{ github.sha }}
        if: github.event_name == 'push' && steps.source_pr.outputs.pr != ''
        run: |
          IMG="ghcr.io/nexo-suite/nexo-${{ matrix.app }}"
          docker buildx imagetools create \
            --tag "${IMG}:main-${{ github.sha }}" \
            --tag "${IMG}:main" \
            "${IMG}:pr-${{ steps.source_pr.outputs.pr }}"

      # Fast path: release-please PR. Retag :main as :pr-<num> so the PR
      # workflow has an image, but skip the build entirely.
      - name: Retag :main as :pr-${{ github.event.number }} (release PR)
        if: github.event_name == 'pull_request' && steps.release_pr.outputs.is_release == 'true'
        run: |
          IMG="ghcr.io/nexo-suite/nexo-${{ matrix.app }}"
          docker buildx imagetools create \
            --tag "${IMG}:pr-${{ github.event.number }}" \
            "${IMG}:main"

      # Full-build path: every PR build, plus main pushes that didn't come from
      # a PR (direct commits, emergency squashes).
      - name: Checkout
        if: (github.event_name == 'pull_request' && steps.release_pr.outputs.is_release != 'true') || (github.event_name == 'push' && steps.source_pr.outputs.pr == '')
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Set up Buildx
        if: (github.event_name == 'pull_request' && steps.release_pr.outputs.is_release != 'true') || (github.event_name == 'push' && steps.source_pr.outputs.pr == '')
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Compute tags
        id: tags
        if: (github.event_name == 'pull_request' && steps.release_pr.outputs.is_release != 'true') || (github.event_name == 'push' && steps.source_pr.outputs.pr == '')
        run: |
          IMG="ghcr.io/nexo-suite/nexo-${{ matrix.app }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAGS="${IMG}:pr-${{ github.event.number }}"
          else
            TAGS="${IMG}:main-${{ github.sha }}
          ${IMG}:main"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push nexo-${{ matrix.app }}
        if: (github.event_name == 'pull_request' && steps.release_pr.outputs.is_release != 'true') || (github.event_name == 'push' && steps.source_pr.outputs.pr == '')
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ${{ matrix.dir }}/Dockerfile
          push: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max

  release-please:
    needs: [quality, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
      auth_version: ${{ steps.release.outputs['apps/auth--version'] }}
      admin_version: ${{ steps.release.outputs['apps/admin--version'] }}
      finance_version: ${{ steps.release.outputs['apps/finance--version'] }}
      flaschen_version: ${{ steps.release.outputs['apps/flaschen--version'] }}
      landing_version: ${{ steps.release.outputs['apps/landing--version'] }}
      bot_version: ${{ steps.release.outputs['apps/bot--version'] }}
      db_version: ${{ steps.release.outputs['packages/db--version'] }}
    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.1.6
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Run release-please
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  promote:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { app: db, version_key: db_version }
          - { app: auth, version_key: auth_version }
          - { app: admin, version_key: admin_version }
          - { app: finance, version_key: finance_version }
          - { app: flaschen, version_key: flaschen_version }
          - { app: landing, version_key: landing_version }
          - { app: bot, version_key: bot_version }
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag :main-<sha> as :latest and :<version>
        run: |
          IMG="ghcr.io/nexo-suite/nexo-${{ matrix.app }}"
          SRC="${IMG}:main-${{ github.sha }}"
          VERSION="${{ needs.release-please.outputs[matrix.version_key] }}"

          TAG_ARGS="--tag ${IMG}:latest"
          if [ -n "$VERSION" ]; then
            TAG_ARGS="${TAG_ARGS} --tag ${IMG}:${VERSION}"
          fi

          # Registry-side tag op — no layer pull/push.
          docker buildx imagetools create $TAG_ARGS "$SRC"

  deploy-production:
    needs: [release-please, promote]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          APP_VERSION_AUTH: ${{ needs.release-please.outputs.auth_version }}
          APP_VERSION_ADMIN: ${{ needs.release-please.outputs.admin_version }}
          APP_VERSION_FINANCE: ${{ needs.release-please.outputs.finance_version }}
          APP_VERSION_FLASCHEN: ${{ needs.release-please.outputs.flaschen_version }}
          APP_VERSION_LANDING: ${{ needs.release-please.outputs.landing_version }}
          APP_VERSION_BOT: ${{ needs.release-please.outputs.bot_version }}
          APP_COMMIT: ${{ github.sha }}
          APP_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_VERSION_AUTH,APP_VERSION_ADMIN,APP_VERSION_FINANCE,APP_VERSION_FLASCHEN,APP_VERSION_LANDING,APP_VERSION_BOT,APP_COMMIT,APP_BUILD_TIME
          script: |
            set -e
            cd /home/deploy/nexo

            # Capture currently-running production images as :previous so we can
            # roll back if the new images fail their post-deploy healthcheck.
            PROD_IMAGES="nexo-auth nexo-admin nexo-finance nexo-flaschen nexo-landing nexo-bot nexo-db"
            echo "📸 Tagging current :latest images as :previous"
            for svc in $PROD_IMAGES; do
              img="ghcr.io/nexo-suite/${svc}:latest"
              if docker image inspect "$img" >/dev/null 2>&1; then
                docker tag "$img" "ghcr.io/nexo-suite/${svc}:previous"
              fi
            done

            git fetch --prune origin
            git checkout -f main
            git reset --hard origin/main

            # Landing displays each app's version; pass them as a JSON blob so
            # +layout.server.ts can resolve them at request time.
            export APP_VERSIONS_JSON=$(jq -nc \
              --arg finance "$APP_VERSION_FINANCE" \
              --arg auth "$APP_VERSION_AUTH" \
              --arg admin "$APP_VERSION_ADMIN" \
              --arg landing "$APP_VERSION_LANDING" \
              '{finance: $finance, auth: $auth, admin: $admin, landing: $landing}')

            # Pull pre-built images from GHCR (public, no auth required)
            docker compose -f docker-compose.yml \
              --profile production --profile server \
              --env-file .env \
              pull

            docker compose -f docker-compose.yml \
              --profile production --profile server \
              --env-file .env \
              up -d

            # Reload Caddy config in case Caddyfile changed
            docker compose -f docker-compose.yml exec caddy caddy reload --config /etc/caddy/Caddyfile

            # Healthcheck-gated rollback. Wait ~30s for services to settle, then
            # probe /healthz on each public app. If any fail, retag :previous as
            # :latest and bring the stack back up on the prior images.
            echo "⏳ Waiting 30s for services to settle"
            sleep 30

            HEALTH_HOSTS="auth.krieger2501.de admin.krieger2501.de finance.krieger2501.de flaschen.krieger2501.de krieger2501.de"
            HEALTH_OK=true
            for host in $HEALTH_HOSTS; do
              if curl -fsS --max-time 10 "https://${host}/healthz" >/dev/null; then
                echo "✅ ${host} healthy"
              else
                echo "❌ ${host} healthcheck failed"
                HEALTH_OK=false
              fi
            done

            if [ "$HEALTH_OK" = "false" ]; then
              echo "🚨 Healthcheck failed — rolling back to :previous images"
              for svc in $PROD_IMAGES; do
                prev="ghcr.io/nexo-suite/${svc}:previous"
                latest="ghcr.io/nexo-suite/${svc}:latest"
                if docker image inspect "$prev" >/dev/null 2>&1; then
                  docker tag "$prev" "$latest"
                fi
              done
              docker compose -f docker-compose.yml \
                --profile production --profile server \
                --env-file .env \
                up -d
              docker compose -f docker-compose.yml exec caddy caddy reload --config /etc/caddy/Caddyfile || true
              echo "🔁 Rollback complete — failing the workflow"
              exit 1
            fi

            # Redeploy preview from prebuilt :main images (built+pushed earlier
            # in this run). No source build on the VPS.
            PREVIEW_TAG=main docker compose -f docker-compose.yml \
              --profile preview \
              --env-file .env.preview \
              pull
            PREVIEW_TAG=main docker compose -f docker-compose.yml \
              --profile preview \
              --env-file .env.preview \
              up -d
