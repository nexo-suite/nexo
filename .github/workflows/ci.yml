name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write
  deployments: write

jobs:
  checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.0
        env:
          PNPM_HOME: ${{ runner.temp }}/pnpm

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package.json sort order
        run: pnpm package:check

      - name: Check formatting (oxfmt)
        run: pnpm format:check

      - name: Sync SvelteKit types
        run: pnpm sync

      - name: Compile Paraglide messages
        run: pnpm translate

      - name: Build workspace packages
        run: pnpm build:packages

      - name: Find dead code (knip)
        run: pnpm knip

      - name: Lint (oxlint + svelte)
        run: pnpm lint

      - name: Type check (svelte-check / tsc)
        run: pnpm type:check

      - name: Run unit tests
        run: pnpm test

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.0
        env:
          PNPM_HOME: ${{ runner.temp }}/pnpm

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize CI context
        id: ctx
        env:
          # `GITHUB_EVENT_NAME`, `GITHUB_SHA`, `GITHUB_REPOSITORY` and friends
          # are auto-set in the runner env. The values below are the ones we
          # actually have to lift out of the `github.event.*` context.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          RELEASE_PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
        run: pnpm exec nexo ci-init

      - name: Log in to GHCR
        if: steps.ctx.outputs.push == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build apps
        run: pnpm exec nexo build-apps

      - name: Prepare deploy contexts
        run: pnpm exec nexo prepare-contexts

      - name: Build & push container images
        env:
          NEXO_BOT_URL: ${{ secrets.NEXO_BOT_URL }}
          NEXO_BOT_SECRET: ${{ secrets.NEXO_BOT_SECRET }}
        run: pnpm exec nexo build-images

      - name: Retag images
        run: pnpm exec nexo retag

  release-please:
    name: Release Please
    needs: [checks, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
      versions_json: ${{ steps.versions.outputs.json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.GH_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Setup pnpm
        if: steps.release.outputs.releases_created == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.0
        env:
          PNPM_HOME: ${{ runner.temp }}/pnpm

      - name: Setup Node
        if: steps.release.outputs.releases_created == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        if: steps.release.outputs.releases_created == 'true'
        run: pnpm install --frozen-lockfile

      - name: Collect versions for promote
        id: versions
        if: steps.release.outputs.releases_created == 'true'
        env:
          RP_OUTPUTS_JSON: ${{ toJSON(steps.release.outputs) }}
        run: |
          json=$(pnpm exec nexo collect-versions)
          echo "json=$json" >> "$GITHUB_OUTPUT"

  promote:
    name: Promote to :latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.0
        env:
          PNPM_HOME: ${{ runner.temp }}/pnpm

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Promote :main-<sha> to :latest and :<version>
        env:
          RELEASE_VERSIONS_JSON: ${{ needs.release-please.outputs.versions_json }}
        run: pnpm exec nexo promote

  deploy-production:
    name: Deploy to Production
    needs: [release-please, promote]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://krieger2501.de
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.0
        env:
          PNPM_HOME: ${{ runner.temp }}/pnpm

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to VPS
        id: deploy
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          APP_VERSION_AUTH: ${{ fromJSON(needs.release-please.outputs.versions_json).auth }}
          APP_VERSION_ADMIN: ${{ fromJSON(needs.release-please.outputs.versions_json).admin }}
          APP_VERSION_FINANCE: ${{ fromJSON(needs.release-please.outputs.versions_json).finance }}
          APP_VERSION_FLASCHEN: ${{ fromJSON(needs.release-please.outputs.versions_json).flaschen }}
          APP_VERSION_CALORIE: ${{ fromJSON(needs.release-please.outputs.versions_json).calorie }}
          APP_VERSION_LANDING: ${{ fromJSON(needs.release-please.outputs.versions_json).landing }}
          APP_VERSION_BOT: ${{ fromJSON(needs.release-please.outputs.versions_json).bot }}
          APP_VERSION_DB: ${{ fromJSON(needs.release-please.outputs.versions_json).db }}
          APP_COMMIT: ${{ github.sha }}
          APP_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_VERSION_AUTH,APP_VERSION_ADMIN,APP_VERSION_FINANCE,APP_VERSION_FLASCHEN,APP_VERSION_CALORIE,APP_VERSION_LANDING,APP_VERSION_BOT,APP_VERSION_DB,APP_COMMIT,APP_BUILD_TIME
          script: |
            set -e
            cd /home/deploy/nexo
            git fetch --prune origin
            git checkout -f main
            git reset --hard origin/main
            node scripts/deploy.mjs

      - name: Write job summary
        if: always()
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          VERSIONS_JSON: ${{ needs.release-please.outputs.versions_json }}
        run: pnpm exec nexo deploy-summary
