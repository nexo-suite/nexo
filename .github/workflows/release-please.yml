name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
      auth_version: ${{ steps.release.outputs['apps/auth--version'] }}
      admin_version: ${{ steps.release.outputs['apps/admin--version'] }}
      finance_version: ${{ steps.release.outputs['apps/finance--version'] }}
      flaschen_version: ${{ steps.release.outputs['apps/flaschen--version'] }}
      landing_version: ${{ steps.release.outputs['apps/landing--version'] }}
      bot_version: ${{ steps.release.outputs['apps/bot--version'] }}
      db_version: ${{ steps.release.outputs['packages/db--version'] }}
    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.1.6
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Run release-please
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-push:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { app: db, dir: packages/db, version: db_version }
          - { app: auth, dir: apps/auth, version: auth_version }
          - { app: admin, dir: apps/admin, version: admin_version }
          - { app: finance, dir: apps/finance, version: finance_version }
          - { app: flaschen, dir: apps/flaschen, version: flaschen_version }
          - { app: landing, dir: apps/landing, version: landing_version }
          - { app: bot, dir: apps/bot, version: bot_version }
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Generate app token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.1.6
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: x-access-token
          password: ${{ steps.app-token.outputs.token }}

      - name: Compute tags
        id: tags
        run: |
          IMG="ghcr.io/nexo-suite/nexo-${{ matrix.app }}"
          TAGS="${IMG}:latest"
          VERSION="${{ needs.release-please.outputs[matrix.version] }}"
          if [ -n "$VERSION" ]; then
            TAGS="${TAGS}
          ${IMG}:${VERSION}"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push nexo-${{ matrix.app }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ${{ matrix.dir }}/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max

  deploy-production:
    needs: [release-please, build-and-push]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/deploy/nexo

            # Capture currently-running production images as :previous so we can
            # roll back if the new images fail their post-deploy healthcheck.
            PROD_IMAGES="nexo-auth nexo-admin nexo-finance nexo-flaschen nexo-landing nexo-bot nexo-db"
            echo "📸 Tagging current :latest images as :previous"
            for svc in $PROD_IMAGES; do
              img="ghcr.io/nexo-suite/${svc}:latest"
              if docker image inspect "$img" >/dev/null 2>&1; then
                docker tag "$img" "ghcr.io/nexo-suite/${svc}:previous"
              fi
            done

            git fetch --prune origin
            git checkout -f main
            git reset --hard origin/main

            # Pull pre-built images from GHCR (public, no auth required)
            docker compose -f docker-compose.yml \
              --profile production --profile server \
              --env-file .env \
              pull

            docker compose -f docker-compose.yml \
              --profile production --profile server \
              --env-file .env \
              up -d

            # Reload Caddy config in case Caddyfile changed
            docker compose -f docker-compose.yml exec caddy caddy reload --config /etc/caddy/Caddyfile

            # Healthcheck-gated rollback. Wait ~30s for services to settle, then
            # probe /healthz on each public app. If any fail, retag :previous as
            # :latest and bring the stack back up on the prior images.
            echo "⏳ Waiting 30s for services to settle"
            sleep 30

            HEALTH_HOSTS="auth.krieger2501.de admin.krieger2501.de finance.krieger2501.de flaschen.krieger2501.de krieger2501.de"
            HEALTH_OK=true
            for host in $HEALTH_HOSTS; do
              if curl -fsS --max-time 10 "https://${host}/healthz" >/dev/null; then
                echo "✅ ${host} healthy"
              else
                echo "❌ ${host} healthcheck failed"
                HEALTH_OK=false
              fi
            done

            if [ "$HEALTH_OK" = "false" ]; then
              echo "🚨 Healthcheck failed — rolling back to :previous images"
              for svc in $PROD_IMAGES; do
                prev="ghcr.io/nexo-suite/${svc}:previous"
                latest="ghcr.io/nexo-suite/${svc}:latest"
                if docker image inspect "$prev" >/dev/null 2>&1; then
                  docker tag "$prev" "$latest"
                fi
              done
              docker compose -f docker-compose.yml \
                --profile production --profile server \
                --env-file .env \
                up -d
              docker compose -f docker-compose.yml exec caddy caddy reload --config /etc/caddy/Caddyfile || true
              echo "🔁 Rollback complete — failing the workflow"
              exit 1
            fi

            # Redeploy preview — still builds from source (PR-specific code)
            docker compose -f docker-compose.yml \
              --profile preview \
              --env-file .env.preview \
              up -d --build
