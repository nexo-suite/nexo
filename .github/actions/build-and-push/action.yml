name: Build and push images
description: |
  Log in to GHCR, set up Buildx, and run `pnpm nexo ci`. The CLI decides
  whether to retag an existing PR image, retag :main for a release-please
  PR, or run a full prepare → build → push pass.

inputs:
  push:
    description: When 'true', push images to GHCR.
    required: false
    default: 'false'
  github-token:
    description: Token for GHCR login and `gh api` PR lookup.
    required: true

runs:
  using: composite
  steps:
    - name: Log in to GHCR
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Set up Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

    - name: Build and push
      shell: bash
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.number }}
        RELEASE_PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      run: |
        pnpm exec nexo ci ${{ inputs.push == 'true' && '--push' || '' }}
