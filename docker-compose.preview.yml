services:
  postgres_preview:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - pgdata_preview:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nexo
      POSTGRES_USER: nexo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexo']
      interval: 5s
      timeout: 5s
      retries: 5

  migrate_preview:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres_preview:
        condition: service_healthy
    restart: on-failure

  auth_preview:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    restart: unless-stopped
    ports:
      - '4001:3000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.preview.krieger2501.de
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
    depends_on:
      migrate_preview:
        condition: service_completed_successfully

  finance_preview:
    build:
      context: .
      dockerfile: apps/finance/Dockerfile
      args:
        PUBLIC_APP_VERSION: ${PUBLIC_APP_VERSION:-preview}
    restart: unless-stopped
    ports:
      - '4002:3000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.preview.krieger2501.de
    depends_on:
      migrate_preview:
        condition: service_completed_successfully

  landing_preview:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
      args:
        PUBLIC_FINANCE_URL: https://finance.preview.krieger2501.de
        PUBLIC_APP_VERSION: ${PUBLIC_APP_VERSION:-preview}
    restart: unless-stopped
    ports:
      - '4000:3000'

volumes:
  pgdata_preview:
