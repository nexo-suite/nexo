name: nexo

networks:
  production:
    name: nexo-production

# YAML anchors — environment blocks shared between each app's production
# and `_unstable` peer service. Keeps the two siblings byte-identical apart
# from `image`, `profiles`, `container_name`, and labels.
x-auth-env: &auth-env
  DATABASE_URL: ${DATABASE_URL}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
  PUBLIC_AUTH_URL: https://auth.krieger2501.de
  PROTOCOL_HEADER: x-forwarded-proto
  HOST_HEADER: x-forwarded-host
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
  DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
  DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
  FINANCE_URL: https://finance.krieger2501.de
  ADMIN_URL: https://admin.krieger2501.de
  FLASCHEN_URL: https://flaschen.krieger2501.de
  CALORIE_URL: https://calorie.krieger2501.de
  PUBLIC_LANDING_URL: https://krieger2501.de
  APP_VERSION: ${APP_VERSION_AUTH:-}
  APP_COMMIT: ${APP_COMMIT:-}
  APP_BUILD_TIME: ${APP_BUILD_TIME:-}

x-admin-env: &admin-env
  DATABASE_URL: ${DATABASE_URL}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
  PUBLIC_AUTH_URL: https://auth.krieger2501.de
  PUBLIC_ADMIN_URL: https://admin.krieger2501.de
  PUBLIC_LANDING_URL: https://krieger2501.de
  RESEND_API_KEY: ${RESEND_API_KEY}
  ADMIN_EMAIL: ${ADMIN_EMAIL}
  PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
  VAPID_SUBJECT: ${VAPID_SUBJECT}
  PUBLIC_GRAFANA_URL: https://grafana.krieger2501.de
  PROTOCOL_HEADER: x-forwarded-proto
  HOST_HEADER: x-forwarded-host
  APP_VERSION: ${APP_VERSION_ADMIN:-}
  APP_COMMIT: ${APP_COMMIT:-}
  APP_BUILD_TIME: ${APP_BUILD_TIME:-}

x-finance-env: &finance-env
  DATABASE_URL: ${DATABASE_URL}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
  PUBLIC_AUTH_URL: https://auth.krieger2501.de
  PUBLIC_FINANCE_URL: https://finance.krieger2501.de
  PUBLIC_LANDING_URL: https://krieger2501.de
  PROTOCOL_HEADER: x-forwarded-proto
  HOST_HEADER: x-forwarded-host
  APP_VERSION: ${APP_VERSION_FINANCE:-}
  APP_COMMIT: ${APP_COMMIT:-}
  APP_BUILD_TIME: ${APP_BUILD_TIME:-}

x-calorie-env: &calorie-env
  DATABASE_URL: ${DATABASE_URL}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
  PUBLIC_AUTH_URL: https://auth.krieger2501.de
  PUBLIC_CALORIE_URL: https://calorie.krieger2501.de
  PUBLIC_LANDING_URL: https://krieger2501.de
  PROTOCOL_HEADER: x-forwarded-proto
  HOST_HEADER: x-forwarded-host
  APP_VERSION: ${APP_VERSION_CALORIE:-}
  APP_COMMIT: ${APP_COMMIT:-}
  APP_BUILD_TIME: ${APP_BUILD_TIME:-}

x-flaschen-env: &flaschen-env
  DATABASE_URL: ${DATABASE_URL}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
  PUBLIC_AUTH_URL: https://auth.krieger2501.de
  PUBLIC_FLASCHEN_URL: https://flaschen.krieger2501.de
  PUBLIC_LANDING_URL: https://krieger2501.de
  PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
  VAPID_SUBJECT: ${VAPID_SUBJECT}
  FLASCHEN_TOKEN_ENC_KEY: ${FLASCHEN_TOKEN_ENC_KEY}
  FLASCHEN_OAUTH_CLIENT_ID: ${FLASCHEN_OAUTH_CLIENT_ID}
  FLASCHEN_API_TZ_MODE: ${FLASCHEN_API_TZ_MODE:-local-naive}
  PROTOCOL_HEADER: x-forwarded-proto
  HOST_HEADER: x-forwarded-host
  APP_VERSION: ${APP_VERSION_FLASCHEN:-}
  APP_COMMIT: ${APP_COMMIT:-}
  APP_BUILD_TIME: ${APP_BUILD_TIME:-}

x-landing-env: &landing-env
  PUBLIC_FINANCE_URL: https://finance.krieger2501.de
  PUBLIC_FLASCHEN_URL: https://flaschen.krieger2501.de
  PUBLIC_ADMIN_URL: https://admin.krieger2501.de
  PUBLIC_AUTH_URL: https://auth.krieger2501.de
  PUBLIC_LANDING_URL: https://krieger2501.de
  DATABASE_URL: ${DATABASE_URL}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
  APP_VERSION: ${APP_VERSION_LANDING:-}
  APP_VERSIONS_JSON: ${APP_VERSIONS_JSON:-}
  APP_COMMIT: ${APP_COMMIT:-}
  APP_BUILD_TIME: ${APP_BUILD_TIME:-}

# Loki logging block — same on both production and unstable.
x-app-logging: &app-logging
  driver: loki
  options:
    loki-url: 'http://localhost:3100/loki/api/v1/push'
    mode: non-blocking
    max-buffer-size: 4m
    loki-pipeline-stages: |
      - json:
          expressions:
            level: level
            service: service
      - labels:
          level:
          service:

# Standard healthcheck for SvelteKit Node apps.
x-app-healthcheck: &app-healthcheck
  test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/healthz']
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s
  start_interval: 2s

services:
  # ── Production ────────────────────────────────────────────────────────────────

  postgres:
    profiles: [production]
    image: postgres:17
    restart: unless-stopped
    networks: [production]
    mem_limit: 3g
    mem_reservation: 1g
    cpu_shares: 2048
    oom_score_adj: -800
    shm_size: 256mb
    command:
      - postgres
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=3GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - max_connections=80
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - jit=off
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - track_io_timing=on
      - -c
      - log_min_duration_statement=500
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nexo
      POSTGRES_USER: nexo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexo']
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-external-labels: 'service=postgres,container_name={{.Name}}'

  pgbouncer:
    profiles: [production]
    image: edoburu/pgbouncer:v1.23.1-p3
    restart: unless-stopped
    networks: [production]
    mem_limit: 64m
    mem_reservation: 32m
    cpu_shares: 512
    oom_score_adj: -200
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: nexo
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: nexo
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      RESERVE_POOL_SIZE: 5
      MAX_PREPARED_STATEMENTS: 100
      SERVER_RESET_QUERY: DISCARD ALL
      AUTH_TYPE: scram-sha-256
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -p 5432 -U nexo']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-external-labels: 'service=pgbouncer,container_name={{.Name}}'
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-db:${APP_VERSION_DB:-latest}
    pull_policy: always
    networks: [production]
    environment:
      DATABASE_URL: ${MIGRATE_DATABASE_URL:-${DATABASE_URL}}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-external-labels: 'service=migrate,container_name={{.Name}}'

  auth:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-auth:${APP_VERSION_AUTH:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 384m
    mem_reservation: 128m
    cpu_shares: 512
    oom_score_adj: -100
    labels:
      nexo.healthz: 'true'
    healthcheck: *app-healthcheck
    logging: *app-logging
    environment: *auth-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  auth_unstable:
    profiles: [unstable]
    image: ghcr.io/nexo-suite/nexo-auth:${AUTH_UNSTABLE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 384m
    mem_reservation: 128m
    cpu_shares: 512
    oom_score_adj: -100
    labels:
      nexo.unstable: 'true'
    healthcheck: *app-healthcheck
    logging: *app-logging
    environment: *auth-env
    depends_on:
      migrate:
        condition: service_completed_successfully
        required: false

  admin:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-admin:${APP_VERSION_ADMIN:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    networks: [production]
    mem_limit: 512m
    mem_reservation: 128m
    cpu_shares: 1024
    oom_score_adj: -200
    labels:
      nexo.healthz: 'true'
    group_add:
      - '${DOCKER_GID:-988}'
    healthcheck: *app-healthcheck
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging: *app-logging
    environment: *admin-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  admin_unstable:
    profiles: [unstable]
    image: ghcr.io/nexo-suite/nexo-admin:${ADMIN_UNSTABLE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    networks: [production]
    mem_limit: 512m
    mem_reservation: 128m
    cpu_shares: 1024
    oom_score_adj: -200
    labels:
      nexo.unstable: 'true'
    group_add:
      - '${DOCKER_GID:-988}'
    healthcheck: *app-healthcheck
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging: *app-logging
    environment: *admin-env
    depends_on:
      migrate:
        condition: service_completed_successfully
        required: false

  finance:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-finance:${APP_VERSION_FINANCE:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 768m
    mem_reservation: 192m
    cpu_shares: 2048
    oom_score_adj: -500
    labels:
      nexo.healthz: 'true'
    healthcheck: *app-healthcheck
    logging: *app-logging
    environment: *finance-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  finance_unstable:
    profiles: [unstable]
    image: ghcr.io/nexo-suite/nexo-finance:${FINANCE_UNSTABLE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 768m
    mem_reservation: 192m
    cpu_shares: 2048
    oom_score_adj: -500
    labels:
      nexo.unstable: 'true'
    healthcheck: *app-healthcheck
    logging: *app-logging
    environment: *finance-env
    depends_on:
      migrate:
        condition: service_completed_successfully
        required: false

  calorie:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-calorie:${APP_VERSION_CALORIE:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 512m
    mem_reservation: 192m
    cpu_shares: 1024
    oom_score_adj: -300
    labels:
      nexo.healthz: 'true'
    healthcheck: *app-healthcheck
    logging: *app-logging
    environment: *calorie-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  calorie_unstable:
    profiles: [unstable]
    image: ghcr.io/nexo-suite/nexo-calorie:${CALORIE_UNSTABLE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 512m
    mem_reservation: 192m
    cpu_shares: 1024
    oom_score_adj: -300
    labels:
      nexo.unstable: 'true'
    healthcheck: *app-healthcheck
    logging: *app-logging
    environment: *calorie-env
    depends_on:
      migrate:
        condition: service_completed_successfully
        required: false

  flaschen:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-flaschen:${APP_VERSION_FLASCHEN:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 512m
    mem_reservation: 128m
    cpu_shares: 1024
    oom_score_adj: -200
    labels:
      nexo.healthz: 'true'
    healthcheck: *app-healthcheck
    logging: *app-logging
    environment: *flaschen-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  flaschen_unstable:
    profiles: [unstable]
    image: ghcr.io/nexo-suite/nexo-flaschen:${FLASCHEN_UNSTABLE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 512m
    mem_reservation: 128m
    cpu_shares: 1024
    oom_score_adj: -200
    labels:
      nexo.unstable: 'true'
    healthcheck: *app-healthcheck
    logging: *app-logging
    environment: *flaschen-env
    depends_on:
      migrate:
        condition: service_completed_successfully
        required: false

  flaschen-worker:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-flaschen:${APP_VERSION_FLASCHEN:-latest}
    pull_policy: always
    command: node build/worker/index.js
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 256m
    mem_reservation: 96m
    cpu_shares: 512
    oom_score_adj: 0
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                service: service
          - labels:
              level:
              service:
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      FLASCHEN_TOKEN_ENC_KEY: ${FLASCHEN_TOKEN_ENC_KEY}
      FLASCHEN_OAUTH_CLIENT_ID: ${FLASCHEN_OAUTH_CLIENT_ID}
      FLASCHEN_QUIET_HOURS: ${FLASCHEN_QUIET_HOURS:-22-06}
      FLASCHEN_POLL_INTERVAL_MS: ${FLASCHEN_POLL_INTERVAL_MS:-180000}
      FLASCHEN_POLL_JITTER_MS: ${FLASCHEN_POLL_JITTER_MS:-30000}
      FLASCHEN_API_TZ_MODE: ${FLASCHEN_API_TZ_MODE:-local-naive}
      APP_VERSION: ${APP_VERSION_FLASCHEN:-}
      APP_COMMIT: ${APP_COMMIT:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3004/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      migrate:
        condition: service_completed_successfully

  landing:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-landing:${APP_VERSION_LANDING:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 192m
    mem_reservation: 64m
    cpu_shares: 256
    oom_score_adj: 0
    labels:
      nexo.healthz: 'true'
    healthcheck: *app-healthcheck
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
    environment: *landing-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  landing_unstable:
    profiles: [unstable]
    image: ghcr.io/nexo-suite/nexo-landing:${LANDING_UNSTABLE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 192m
    mem_reservation: 64m
    cpu_shares: 256
    oom_score_adj: 0
    labels:
      nexo.unstable: 'true'
    healthcheck: *app-healthcheck
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
    environment: *landing-env
    depends_on:
      migrate:
        condition: service_completed_successfully
        required: false

  # ── Server-only (Caddy + bot) ─────────────────────────────────────────────────

  loki:
    profiles: [server]
    image: grafana/loki:3.4.2
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    networks: [production]
    mem_limit: 384m
    mem_reservation: 128m
    cpu_shares: 512
    oom_score_adj: 200
    ports:
      - '127.0.0.1:3100:3100'
    volumes:
      - loki_data:/loki
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  grafana:
    profiles: [server]
    image: grafana/grafana:11.5.0
    restart: unless-stopped
    networks: [production]
    mem_limit: 192m
    mem_reservation: 64m
    cpu_shares: 256
    oom_score_adj: 200
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: https://grafana.krieger2501.de
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    depends_on: [loki]

  prometheus:
    profiles: [server]
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    networks: [production]
    mem_limit: 384m
    mem_reservation: 128m
    cpu_shares: 512
    oom_score_adj: 100
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
      - --storage.tsdb.retention.size=2GB
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  cadvisor:
    profiles: [server]
    image: ghcr.io/google/cadvisor:v0.57.0
    restart: unless-stopped
    networks: [production]
    mem_limit: 192m
    mem_reservation: 64m
    cpu_shares: 256
    oom_score_adj: 200
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
      - --store_container_labels=false
      - --disable_metrics=disk,diskIO,tcp,udp,percpu,sched,process,hugetlb,referenced_memory,resctrl,cpu_topology
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  node-exporter:
    profiles: [server]
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    networks: [production]
    mem_limit: 64m
    mem_reservation: 16m
    cpu_shares: 128
    oom_score_adj: 200
    pid: host
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker)($$|/)
      - --no-collector.wifi
      - --no-collector.hwmon
    volumes:
      - /:/host:ro,rslave
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  postgres-exporter:
    profiles: [server]
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    networks: [production]
    mem_limit: 64m
    mem_reservation: 16m
    cpu_shares: 128
    oom_score_adj: 100
    environment:
      DATA_SOURCE_NAME: postgres://nexo:${POSTGRES_PASSWORD}@postgres:5432/nexo?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres-exporter/queries.yaml
    volumes:
      - ./prometheus/postgres-queries.yaml:/etc/postgres-exporter/queries.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    profiles: [server]
    image: ghcr.io/nexo-suite/nexo-bot:${APP_VERSION_BOT:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 192m
    mem_reservation: 64m
    cpu_shares: 256
    oom_score_adj: 0
    labels:
      nexo.healthz: 'true'
      nexo.healthz.port: '3003'
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
    environment:
      GH_CLIENT_ID: ${GH_CLIENT_ID}
      GH_APP_PRIVATE_KEY: ${GH_APP_PRIVATE_KEY}
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      GH_REPO_OWNER: ${GH_REPO_OWNER}
      GH_REPO_NAME: ${GH_REPO_NAME}
      NEXO_BOT_SECRET: ${NEXO_BOT_SECRET}
      APP_VERSION: ${APP_VERSION_BOT:-}
      APP_COMMIT: ${APP_COMMIT:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
      BOT_STATE_FILE: /data/bot-state.json
    volumes:
      - bot_data:/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3003/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  caddy:
    profiles: [server]
    image: caddy:2
    restart: unless-stopped
    networks: [production]
    mem_limit: 192m
    mem_reservation: 64m
    cpu_shares: 1024
    oom_score_adj: -300
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-external-labels: 'service=caddy,container_name={{.Name}}'
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
          - labels:
              level:
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  loki_data:
  grafana_data:
  prometheus_data:
  caddy_data:
  caddy_config:
  bot_data:
