name: nexo

networks:
  production:
    name: nexo-production
  preview:
    name: nexo-preview

services:
  # ── Production ────────────────────────────────────────────────────────────────

  postgres:
    profiles: [production]
    image: postgres:17
    restart: unless-stopped
    networks: [production]
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nexo
      POSTGRES_USER: nexo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexo']
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    profiles: [production]
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    networks: [production]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  auth:
    profiles: [production]
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    restart: unless-stopped
    init: true
    networks: [production]
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                service: service
          - labels:
              level:
              service:
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.krieger2501.de
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      FINANCE_URL: https://finance.krieger2501.de
      ADMIN_URL: https://admin.krieger2501.de
      FLASCHEN_URL: https://flaschen.krieger2501.de
      PUBLIC_LANDING_URL: https://krieger2501.de
    depends_on:
      migrate:
        condition: service_completed_successfully

  admin:
    profiles: [production]
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    init: true
    networks: [production]
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                service: service
          - labels:
              level:
              service:
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.krieger2501.de
      PUBLIC_ADMIN_URL: https://admin.krieger2501.de
      PUBLIC_LANDING_URL: https://krieger2501.de
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
    depends_on:
      migrate:
        condition: service_completed_successfully

  finance:
    profiles: [production]
    build:
      context: .
      dockerfile: apps/finance/Dockerfile
    restart: unless-stopped
    init: true
    networks: [production]
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                service: service
          - labels:
              level:
              service:
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.krieger2501.de
      PUBLIC_FINANCE_URL: https://finance.krieger2501.de
      PUBLIC_LANDING_URL: https://krieger2501.de
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
    depends_on:
      migrate:
        condition: service_completed_successfully

  flaschen:
    profiles: [production]
    build:
      context: .
      dockerfile: apps/flaschen/Dockerfile
    restart: unless-stopped
    init: true
    networks: [production]
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                service: service
          - labels:
              level:
              service:
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.krieger2501.de
      PUBLIC_FLASCHEN_URL: https://flaschen.krieger2501.de
      PUBLIC_LANDING_URL: https://krieger2501.de
      PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      FLASCHEN_TOKEN_ENC_KEY: ${FLASCHEN_TOKEN_ENC_KEY}
      FLASCHEN_OAUTH_CLIENT_ID: ${FLASCHEN_OAUTH_CLIENT_ID}
      FLASCHEN_API_TZ_MODE: ${FLASCHEN_API_TZ_MODE:-local-naive}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
    depends_on:
      migrate:
        condition: service_completed_successfully

  flaschen-worker:
    profiles: [production]
    build:
      context: .
      dockerfile: apps/flaschen/Dockerfile
    command: node build/worker/index.js
    restart: unless-stopped
    init: true
    networks: [production]
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                service: service
          - labels:
              level:
              service:
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      FLASCHEN_TOKEN_ENC_KEY: ${FLASCHEN_TOKEN_ENC_KEY}
      FLASCHEN_OAUTH_CLIENT_ID: ${FLASCHEN_OAUTH_CLIENT_ID}
      FLASCHEN_QUIET_HOURS: ${FLASCHEN_QUIET_HOURS:-22-06}
      FLASCHEN_POLL_INTERVAL_MS: ${FLASCHEN_POLL_INTERVAL_MS:-180000}
      FLASCHEN_POLL_JITTER_MS: ${FLASCHEN_POLL_JITTER_MS:-30000}
      FLASCHEN_API_TZ_MODE: ${FLASCHEN_API_TZ_MODE:-local-naive}
    depends_on:
      migrate:
        condition: service_completed_successfully

  landing:
    profiles: [production]
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
      args:
        PUBLIC_FINANCE_URL: https://finance.krieger2501.de
    restart: unless-stopped
    init: true
    networks: [production]
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
    environment:
      PUBLIC_FINANCE_URL: https://finance.krieger2501.de
      PUBLIC_FLASCHEN_URL: https://flaschen.krieger2501.de
      PUBLIC_ADMIN_URL: https://admin.krieger2501.de
      PUBLIC_AUTH_URL: https://auth.krieger2501.de
      PUBLIC_LANDING_URL: https://krieger2501.de
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully

  # ── Preview ───────────────────────────────────────────────────────────────────

  postgres_preview:
    profiles: [preview]
    image: postgres:17
    restart: unless-stopped
    networks: [preview]
    volumes:
      - pgdata_preview:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nexo
      POSTGRES_USER: nexo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexo']
      interval: 5s
      timeout: 5s
      retries: 5

  migrate_preview:
    profiles: [preview]
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    networks: [preview]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres_preview:
        condition: service_healthy
    restart: on-failure

  auth_preview:
    profiles: [preview]
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    restart: unless-stopped
    init: true
    networks: [preview]
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.preview.krieger2501.de
      FINANCE_URL: https://finance.preview.krieger2501.de
      ADMIN_URL: https://admin.preview.krieger2501.de
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
    depends_on:
      migrate_preview:
        condition: service_completed_successfully

  admin_preview:
    profiles: [preview]
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    init: true
    networks: [preview]
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.preview.krieger2501.de
      PUBLIC_ADMIN_URL: https://admin.preview.krieger2501.de
      PUBLIC_LANDING_URL: https://preview.krieger2501.de
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
    depends_on:
      migrate_preview:
        condition: service_completed_successfully

  finance_preview:
    profiles: [preview]
    build:
      context: .
      dockerfile: apps/finance/Dockerfile
    restart: unless-stopped
    init: true
    networks: [preview]
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.preview.krieger2501.de
      PUBLIC_FINANCE_URL: https://finance.preview.krieger2501.de
      PUBLIC_LANDING_URL: https://preview.krieger2501.de
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
    depends_on:
      migrate_preview:
        condition: service_completed_successfully

  landing_preview:
    profiles: [preview]
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
      args:
        PUBLIC_FINANCE_URL: https://finance.preview.krieger2501.de
    restart: unless-stopped
    init: true
    networks: [preview]
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      PUBLIC_FINANCE_URL: https://finance.preview.krieger2501.de
    depends_on:
      migrate_preview:
        condition: service_completed_successfully

  # ── Server-only (Caddy + bot) ─────────────────────────────────────────────────

  loki:
    profiles: [server]
    image: grafana/loki:3.4.2
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    networks: [production]
    ports:
      - '127.0.0.1:3100:3100'
    volumes:
      - loki_data:/loki
      - ./loki/config.yaml:/etc/loki/config.yaml:ro

  grafana:
    profiles: [server]
    image: grafana/grafana:11.5.0
    restart: unless-stopped
    networks: [production]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: https://grafana.krieger2501.de
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [loki]

  bot:
    profiles: [server]
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    init: true
    networks: [production]
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
    environment:
      GH_APP_ID: ${GH_APP_ID}
      GH_APP_PRIVATE_KEY: ${GH_APP_PRIVATE_KEY}
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      GH_REPO_OWNER: ${GH_REPO_OWNER}
      GH_REPO_NAME: ${GH_REPO_NAME}
      GITHUB_TOKEN: ${GITHUB_TOKEN}

  caddy:
    profiles: [server]
    image: caddy:2
    restart: unless-stopped
    networks: [production, preview]
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  pgdata_preview:
  loki_data:
  grafana_data:
  caddy_data:
  caddy_config:
