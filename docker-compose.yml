name: nexo

networks:
  production:
    name: nexo-production
  preview:
    name: nexo-preview

services:
  # ── Production ────────────────────────────────────────────────────────────────

  postgres:
    profiles: [production]
    image: postgres:18
    restart: unless-stopped
    networks: [production]
    mem_limit: 2g
    mem_reservation: 768m
    cpu_shares: 2048
    oom_score_adj: -800
    shm_size: 256mb
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - max_connections=80
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - jit=off
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - track_io_timing=on
      - -c
      - log_min_duration_statement=500
    volumes:
      # Mount the parent dir so future major bumps can use pg_upgrade --link.
      # PGDATA is /var/lib/postgresql/18/docker on this image.
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_DB: nexo
      POSTGRES_USER: nexo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexo']
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  pgbouncer:
    profiles: [production]
    image: edoburu/pgbouncer:1.23.1
    restart: unless-stopped
    networks: [production]
    mem_limit: 64m
    mem_reservation: 32m
    cpu_shares: 512
    oom_score_adj: -200
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: nexo
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: nexo
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      RESERVE_POOL_SIZE: 5
      MAX_PREPARED_STATEMENTS: 100
      SERVER_RESET_QUERY: DISCARD ALL
      AUTH_TYPE: scram-sha-256
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -p 5432 -U nexo']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-db:latest
    pull_policy: always
    networks: [production]
    environment:
      DATABASE_URL: ${MIGRATE_DATABASE_URL:-${DATABASE_URL}}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  auth:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-auth:latest
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 256m
    mem_reservation: 96m
    cpu_shares: 512
    oom_score_adj: -100
    labels:
      nexo.healthz: 'true'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 2s
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                service: service
          - labels:
              level:
              service:
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.krieger2501.de
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      FINANCE_URL: https://finance.krieger2501.de
      ADMIN_URL: https://admin.krieger2501.de
      FLASCHEN_URL: https://flaschen.krieger2501.de
      PUBLIC_LANDING_URL: https://krieger2501.de
      APP_VERSION: ${APP_VERSION_AUTH:-}
      APP_COMMIT: ${APP_COMMIT:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

  admin:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-admin:latest
    pull_policy: always
    restart: unless-stopped
    init: true
    networks: [production, preview]
    mem_limit: 512m
    mem_reservation: 128m
    cpu_shares: 1024
    oom_score_adj: -200
    labels:
      nexo.healthz: 'true'
    group_add:
      - '${DOCKER_GID:-988}'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 2s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                service: service
          - labels:
              level:
              service:
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.krieger2501.de
      PUBLIC_ADMIN_URL: https://admin.krieger2501.de
      PUBLIC_LANDING_URL: https://krieger2501.de
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      APP_VERSION: ${APP_VERSION_ADMIN:-}
      APP_COMMIT: ${APP_COMMIT:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

  finance:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-finance:latest
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 768m
    mem_reservation: 192m
    cpu_shares: 2048
    oom_score_adj: -500
    labels:
      nexo.healthz: 'true'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 2s
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                service: service
          - labels:
              level:
              service:
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.krieger2501.de
      PUBLIC_FINANCE_URL: https://finance.krieger2501.de
      PUBLIC_LANDING_URL: https://krieger2501.de
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      APP_VERSION: ${APP_VERSION_FINANCE:-}
      APP_COMMIT: ${APP_COMMIT:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

  flaschen:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-flaschen:latest
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 512m
    mem_reservation: 128m
    cpu_shares: 1024
    oom_score_adj: -200
    labels:
      nexo.healthz: 'true'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 2s
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                service: service
          - labels:
              level:
              service:
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.krieger2501.de
      PUBLIC_FLASCHEN_URL: https://flaschen.krieger2501.de
      PUBLIC_LANDING_URL: https://krieger2501.de
      PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      FLASCHEN_TOKEN_ENC_KEY: ${FLASCHEN_TOKEN_ENC_KEY}
      FLASCHEN_OAUTH_CLIENT_ID: ${FLASCHEN_OAUTH_CLIENT_ID}
      FLASCHEN_API_TZ_MODE: ${FLASCHEN_API_TZ_MODE:-local-naive}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      APP_VERSION: ${APP_VERSION_FLASCHEN:-}
      APP_COMMIT: ${APP_COMMIT:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

  flaschen-worker:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-flaschen:latest
    pull_policy: always
    command: node build/worker/index.js
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 256m
    mem_reservation: 96m
    cpu_shares: 512
    oom_score_adj: 0
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
                service: service
          - labels:
              level:
              service:
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      FLASCHEN_TOKEN_ENC_KEY: ${FLASCHEN_TOKEN_ENC_KEY}
      FLASCHEN_OAUTH_CLIENT_ID: ${FLASCHEN_OAUTH_CLIENT_ID}
      FLASCHEN_QUIET_HOURS: ${FLASCHEN_QUIET_HOURS:-22-06}
      FLASCHEN_POLL_INTERVAL_MS: ${FLASCHEN_POLL_INTERVAL_MS:-180000}
      FLASCHEN_POLL_JITTER_MS: ${FLASCHEN_POLL_JITTER_MS:-30000}
      FLASCHEN_API_TZ_MODE: ${FLASCHEN_API_TZ_MODE:-local-naive}
      APP_VERSION: ${APP_VERSION_FLASCHEN:-}
      APP_COMMIT: ${APP_COMMIT:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3004/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      migrate:
        condition: service_completed_successfully

  landing:
    profiles: [production]
    image: ghcr.io/nexo-suite/nexo-landing:latest
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 192m
    mem_reservation: 64m
    cpu_shares: 256
    oom_score_adj: 0
    labels:
      nexo.healthz: 'true'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 2s
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
    environment:
      PUBLIC_FINANCE_URL: https://finance.krieger2501.de
      PUBLIC_FLASCHEN_URL: https://flaschen.krieger2501.de
      PUBLIC_ADMIN_URL: https://admin.krieger2501.de
      PUBLIC_AUTH_URL: https://auth.krieger2501.de
      PUBLIC_LANDING_URL: https://krieger2501.de
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_VERSION: ${APP_VERSION_LANDING:-}
      APP_VERSIONS_JSON: ${APP_VERSIONS_JSON:-}
      APP_COMMIT: ${APP_COMMIT:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

  # ── Preview ───────────────────────────────────────────────────────────────────

  postgres_preview:
    profiles: [preview]
    image: postgres:18
    restart: unless-stopped
    networks: [preview]
    volumes:
      - pgdata_preview:/var/lib/postgresql
    environment:
      POSTGRES_DB: nexo
      POSTGRES_USER: nexo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexo']
      interval: 5s
      timeout: 5s
      retries: 5

  migrate_preview:
    profiles: [preview]
    image: ghcr.io/nexo-suite/nexo-db:${PREVIEW_TAG:-main}
    networks: [preview]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres_preview:
        condition: service_healthy
    restart: on-failure

  auth_preview:
    profiles: [preview]
    image: ghcr.io/nexo-suite/nexo-auth:${PREVIEW_TAG:-main}
    restart: unless-stopped
    init: true
    networks: [preview]
    labels:
      nexo.healthz: 'true'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.preview.krieger2501.de
      FINANCE_URL: https://finance.preview.krieger2501.de
      ADMIN_URL: https://admin.preview.krieger2501.de
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
    depends_on:
      migrate_preview:
        condition: service_completed_successfully

  admin_preview:
    profiles: [preview]
    image: ghcr.io/nexo-suite/nexo-admin:${PREVIEW_TAG:-main}
    restart: unless-stopped
    init: true
    networks: [preview]
    labels:
      nexo.healthz: 'true'
    group_add:
      - '${DOCKER_GID:-988}'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.preview.krieger2501.de
      PUBLIC_ADMIN_URL: https://admin.preview.krieger2501.de
      PUBLIC_LANDING_URL: https://preview.krieger2501.de
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
    depends_on:
      migrate_preview:
        condition: service_completed_successfully

  finance_preview:
    profiles: [preview]
    image: ghcr.io/nexo-suite/nexo-finance:${PREVIEW_TAG:-main}
    restart: unless-stopped
    init: true
    networks: [preview]
    labels:
      nexo.healthz: 'true'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_AUTH_URL: https://auth.preview.krieger2501.de
      PUBLIC_FINANCE_URL: https://finance.preview.krieger2501.de
      PUBLIC_LANDING_URL: https://preview.krieger2501.de
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
    depends_on:
      migrate_preview:
        condition: service_completed_successfully

  landing_preview:
    profiles: [preview]
    image: ghcr.io/nexo-suite/nexo-landing:${PREVIEW_TAG:-main}
    restart: unless-stopped
    init: true
    networks: [preview]
    labels:
      nexo.healthz: 'true'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      PUBLIC_FINANCE_URL: https://finance.preview.krieger2501.de
      PUBLIC_FLASCHEN_URL: https://flaschen.preview.krieger2501.de
      PUBLIC_ADMIN_URL: https://admin.preview.krieger2501.de
      PUBLIC_AUTH_URL: https://auth.preview.krieger2501.de
      PUBLIC_LANDING_URL: https://preview.krieger2501.de
    depends_on:
      migrate_preview:
        condition: service_completed_successfully

  # ── Server-only (Caddy + bot) ─────────────────────────────────────────────────

  loki:
    profiles: [server]
    image: grafana/loki:3.4.2
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    networks: [production]
    mem_limit: 384m
    mem_reservation: 128m
    cpu_shares: 512
    oom_score_adj: 200
    ports:
      - '127.0.0.1:3100:3100'
    volumes:
      - loki_data:/loki
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  grafana:
    profiles: [server]
    image: grafana/grafana:11.5.0
    restart: unless-stopped
    networks: [production]
    mem_limit: 192m
    mem_reservation: 64m
    cpu_shares: 256
    oom_score_adj: 200
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: https://grafana.krieger2501.de
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    depends_on: [loki]

  bot:
    profiles: [server]
    image: ghcr.io/nexo-suite/nexo-bot:latest
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks: [production]
    mem_limit: 192m
    mem_reservation: 64m
    cpu_shares: 256
    oom_score_adj: 0
    labels:
      nexo.healthz: 'true'
      nexo.healthz.port: '3003'
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
    environment:
      GH_APP_ID: ${GH_APP_ID}
      GH_APP_PRIVATE_KEY: ${GH_APP_PRIVATE_KEY}
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      GH_REPO_OWNER: ${GH_REPO_OWNER}
      GH_REPO_NAME: ${GH_REPO_NAME}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      APP_VERSION: ${APP_VERSION_BOT:-}
      APP_COMMIT: ${APP_COMMIT:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3003/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  caddy:
    profiles: [server]
    image: caddy:2
    restart: unless-stopped
    networks: [production, preview]
    mem_limit: 192m
    mem_reservation: 64m
    cpu_shares: 1024
    oom_score_adj: -300
    logging:
      driver: loki
      options:
        loki-url: 'http://localhost:3100/loki/api/v1/push'
        mode: non-blocking
        max-buffer-size: 4m
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
          - labels:
              level:
