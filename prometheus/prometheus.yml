global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 60s
  external_labels:
    stack: nexo

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # Drop high-cardinality per-pid metrics we don't need.
      - source_labels: [__name__]
        regex: 'container_tasks_state'
        action: drop

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
